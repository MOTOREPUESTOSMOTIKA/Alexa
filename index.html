<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MOTIKA Sistema</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>MOTIKA Control</h1>

<nav>

<button onclick="showSection('dashboard')">Panel</button>
<button onclick="showSection('inventario')">Inventario</button>
<button onclick="showSection('compras')">Compras</button>
<button onclick="showSection('ventas')">Ventas</button>
<button onclick="showSection('pedidos')">Pedidos</button>
<button onclick="showSection('deudas')">Deudas</button>

</nav>

</header>

<main>

<!-- ========================= -->
<!-- DASHBOARD -->
<!-- ========================= -->

<section id="dashboard" class="active">

<h2>Panel financiero</h2>

<div>

<p>Efectivo: <span id="dash-efectivo">0</span></p>
<p>Inventario costo: <span id="dash-inv-costo">0</span></p>
<p>Inventario venta: <span id="dash-inv-venta">0</span></p>
<p>Deudas clientes: <span id="dash-deudas">0</span></p>
<p>Ganancia neta: <span id="dash-ganancia">0</span></p>
<p>Patrimonio: <span id="dash-patrimonio">0</span></p>

</div>

</section>

<!-- ========================= -->
<!-- INVENTARIO -->
<!-- ========================= -->

<section id="inventario">

<h2>Inventario</h2>

<form id="form-agregar-producto">

<input id="prod-nombre" placeholder="Nombre producto" required>
<input id="prod-cantidad" type="number" placeholder="Cantidad" required>
<input id="prod-costo" placeholder="Costo">
<input id="prod-precio" placeholder="Precio venta">

<button type="submit">Agregar producto</button>

</form>

<table>

<thead>

<tr>
<th>Producto</th>
<th>Stock</th>
<th>Costo</th>
<th>Precio</th>
<th>Acciones</th>
</tr>

</thead>

<tbody id="tabla-inventario"></tbody>

</table>

</section>

<!-- ========================= -->
<!-- COMPRAS -->
<!-- ========================= -->

<section id="compras">

<h2>Registrar compra</h2>

<form id="form-compra">

<input id="compra-nombre" placeholder="Producto" required>
<input id="compra-cantidad" type="number" placeholder="Cantidad" required>
<input id="compra-costo" placeholder="Costo unitario" required>
<input id="compra-precio" placeholder="Precio venta mercado">

<button type="submit">Registrar compra</button>

</form>

</section>

<!-- ========================= -->
<!-- VENTAS -->
<!-- ========================= -->

<section id="ventas">

<h2>Registrar venta</h2>

<input id="buscar-producto" placeholder="Buscar producto" onkeyup="buscarProductos(this.value)">

<div id="lista-sugerencias"></div>

<form id="form-venta">

<input id="venta-cantidad" type="number" placeholder="Cantidad">

<button type="submit">Vender</button>

</form>

</section>

<!-- ========================= -->
<!-- PEDIDOS -->
<!-- ========================= -->

<section id="pedidos">

<h2>Pedidos clientes</h2>

<form id="form-pedido">

<input id="pedido-cliente" placeholder="Nombre cliente">

<input id="pedido-producto" placeholder="Producto">

<input id="pedido-cantidad" type="number" placeholder="Cantidad">

<button type="button" onclick="agregarProductoPedido()">Agregar producto</button>

<button type="submit">Guardar pedido</button>

</form>

<div id="productos-pedido"></div>

</section>

<!-- ========================= -->
<!-- DEUDAS -->
<!-- ========================= -->

<section id="deudas">

<h2>Control de deudas</h2>

<form id="form-deuda">

<input id="deuda-cliente" placeholder="Cliente">
<input id="deuda-monto" placeholder="Monto">

<button type="submit">Registrar deuda</button>

</form>

<table>

<thead>

<tr>
<th>Cliente</th>
<th>Deuda</th>
<th>Acción</th>
</tr>

</thead>

<tbody id="tabla-deudas"></tbody>

</table>

</section>

</main>

<!-- ========================= -->
<!-- FIREBASE -->
<!-- ========================= -->

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

const firebaseConfig = {

apiKey: "TU_API_KEY",
authDomain: "TU_DOMINIO",
databaseURL: "TU_DATABASE",
projectId: "TU_PROYECTO",
storageBucket: "TU_BUCKET",
messagingSenderId: "TU_ID",
appId: "TU_APP"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

</script>

<script src="script.js"></script>

</body>

</html>
